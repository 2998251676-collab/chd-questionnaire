<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问卷数据提取工具</title>
<style>
:root { --bg:#f4f6f9; --card:#fff; --text:#1a1a2e; --muted:#6b7280; --blue:#2563eb; --border:#e5e7eb; --green:#16a34a; --red:#dc2626; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); line-height:1.7; }
.container { max-width:860px; margin:0 auto; padding:24px 16px 48px; }

.header { text-align:center; padding:32px 16px 24px; }
.header h1 { font-size:22px; font-weight:700; }
.header p { color:var(--muted); font-size:14px; margin-top:6px; }

.card { background:var(--card); border-radius:12px; padding:24px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.06); border:1px solid var(--border); }
.card h2 { font-size:16px; font-weight:700; margin-bottom:12px; }

.step { display:flex; align-items:flex-start; gap:10px; margin-bottom:12px; }
.step-num { background:var(--blue); color:#fff; min-width:24px; height:24px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; margin-top:2px; }
.step-text { font-size:14px; line-height:1.6; }
.step-text code { background:#f1f5f9; padding:2px 8px; border-radius:4px; font-size:13px; }

textarea { width:100%; height:300px; border:1.5px solid var(--border); border-radius:10px; padding:14px; font-size:13px; font-family:monospace; resize:vertical; line-height:1.6; }
textarea:focus { outline:none; border-color:var(--blue); }

.btn { display:inline-block; padding:12px 32px; border:none; border-radius:22px; background:var(--blue); color:#fff; font-size:14px; font-weight:700; cursor:pointer; transition:all .2s; font-family:inherit; margin:4px; }
.btn:hover { opacity:.92; }
.btn-outline { background:#fff; color:var(--blue); border:2px solid var(--blue); }
.btn-green { background:var(--green); }

.info { display:flex; gap:16px; flex-wrap:wrap; margin:12px 0; }
.info-item { background:#f8fafc; border-radius:8px; padding:12px 20px; text-align:center; }
.info-item .big { font-size:24px; font-weight:700; color:var(--blue); }
.info-item .label { font-size:11px; color:var(--muted); }

.preview-table { overflow-x:auto; max-height:400px; overflow-y:auto; border:1px solid var(--border); border-radius:8px; }
.preview-table table { border-collapse:collapse; font-size:11px; min-width:100%; }
.preview-table th { background:#f8fafc; padding:8px 10px; border:1px solid var(--border); font-weight:600; white-space:nowrap; position:sticky; top:0; }
.preview-table td { padding:6px 10px; border:1px solid #f3f4f6; white-space:nowrap; }

.error-msg { background:#fef2f2; border:1px solid #fecaca; border-radius:8px; padding:12px 16px; color:var(--red); font-size:13px; display:none; }

.foot { text-align:center; font-size:11px; color:#9ca3af; padding:16px; }

@media(max-width:520px) {
  .container { padding:12px 8px 32px; }
  .card { padding:18px 12px; }
  .header h1 { font-size:18px; }
}
</style>
</head>
<body>

<div class="container">

<div class="header">
  <h1>&#128202; 问卷数据提取工具</h1>
  <p>从飞书群消息中提取问卷数据，生成 SPSS 可用的 CSV 文件</p>
</div>

<div class="card">
  <h2>使用步骤</h2>
  <div class="step"><div class="step-num">1</div><div class="step-text">打开飞书群聊，<strong>全选消息</strong>（Ctrl+A 或 Cmd+A）</div></div>
  <div class="step"><div class="step-num">2</div><div class="step-text"><strong>复制消息</strong>（Ctrl+C 或 Cmd+C）</div></div>
  <div class="step"><div class="step-num">3</div><div class="step-text">粘贴到下方文本框</div></div>
  <div class="step"><div class="step-num">4</div><div class="step-text">点击 <strong>"解析数据"</strong> 生成 CSV</div></div>
</div>

<div class="card">
  <h2>粘贴飞书消息</h2>
  <textarea id="rawInput" placeholder="将飞书群中的问卷消息粘贴到这里...&#10;&#10;每条消息至少包含一行 [DATA] 开头的 TSV 数据行"></textarea>
  <div style="margin-top:12px;">
    <button class="btn" onclick="parseData()">&#128269; 解析数据</button>
    <button class="btn btn-outline" onclick="document.getElementById('rawInput').value='';document.getElementById('previewSection').style.display='none';document.getElementById('errorMsg').style.display='none';">清空</button>
  </div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<div class="card" id="previewSection" style="display:none;">
  <h2>解析结果</h2>
  <div class="info">
    <div class="info-item"><div class="big" id="totalCount">0</div><div class="label">有效问卷数</div></div>
    <div class="info-item"><div class="big" id="dupCount">0</div><div class="label">重复(已去重)</div></div>
  </div>
  <div style="margin:12px 0;">
    <button class="btn btn-green" onclick="downloadCSV()">&#128229; 下载 CSV（导入SPSS）</button>
    <button class="btn btn-outline" onclick="downloadJSON()">下载 JSON</button>
  </div>
  <div class="preview-table" id="tableContainer"></div>
</div>

<div class="foot">提取工具 · 数据离线处理 · 不会上传任何信息</div>

</div>

<script>
var parsedRows=[];
var COLUMNS=['code','gender','age','height','weight','marital','education','job_type','work_hours','income','insurance','smoke','drink','family_history','hypertension','diabetes','hyperlipidemia','htn_dm','duration','med_count','exercise','sleep','info_seek','info_source','social_support','support_from','gas_1','gas_2','gas_3','gas_4','gas_5','gas_6','gas_7','gas_8','gas_9','gas_10','gas_11','gas_12','gas_13','gas_14','gas_15','gses_1','gses_2','gses_3','gses_4','gses_5','gses_6','gses_7','gses_8','gses_9','gses_10','fam_1','fam_2','fam_3','fam_4','fam_5'];

function parseData(){
  var raw=document.getElementById('rawInput').value.trim();
  document.getElementById('errorMsg').style.display='none';
  if(!raw){
    document.getElementById('errorMsg').textContent='请先粘贴飞书消息内容';
    document.getElementById('errorMsg').style.display='block';
    return;
  }

  // Find all [DATA] lines - each line is a TSV row
  var lines=raw.split(/[\n\r]+/);
  var dataLines=[];
  lines.forEach(function(line){
    if(line.indexOf('[DATA]')>-1){
      // Extract everything after [DATA]
      var idx=line.indexOf('[DATA]');
      var tsv=line.substring(idx+6).trim();
      if(tsv.length>0) dataLines.push(tsv);
    }
  });

  if(dataLines.length===0){
    document.getElementById('errorMsg').textContent='未找到 [DATA] 数据行。请确保粘贴的是飞书群中问卷提交的消息（每条消息末尾应包含 [DATA] 开头的行）。';
    document.getElementById('errorMsg').style.display='block';
    return;
  }

  // Parse each TSV line
  var rows=[];
  var seenCodes={};
  var dupCount=0;
  dataLines.forEach(function(line){
    var vals=line.split('\t');
    if(vals.length<COLUMNS.length) return; // Skip incomplete lines
    var row={};
    COLUMNS.forEach(function(c,i){ row[c]=vals[i]||''; });
    // Dedup by code
    if(seenCodes[row.code]){ dupCount++; return; }
    seenCodes[row.code]=true;
    rows.push(row);
  });

  if(rows.length===0){
    document.getElementById('errorMsg').textContent='数据解析失败，请检查消息格式是否正确';
    document.getElementById('errorMsg').style.display='block';
    return;
  }

  parsedRows=rows;
  document.getElementById('totalCount').textContent=rows.length;
  document.getElementById('dupCount').textContent=dupCount;

  // Preview table
  var html='<table><thead><tr><th>#</th>';
  COLUMNS.forEach(function(c){ html+='<th>'+c+'</th>'; });
  html+='</tr></thead><tbody>';
  rows.forEach(function(r,i){
    html+='<tr><td>'+(i+1)+'</td>';
    COLUMNS.forEach(function(c){ html+='<td>'+(r[c]||'')+'</td>'; });
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('tableContainer').innerHTML=html;
  document.getElementById('previewSection').style.display='block';
  document.getElementById('previewSection').scrollIntoView({behavior:'smooth'});
}

function toCSV(rows){
  var header=COLUMNS.join('\t');
  var lines=[header];
  rows.forEach(function(r){
    var vals=COLUMNS.map(function(c){ return String(r[c]||'').replace(/\t/g,' ').replace(/\n/g,' '); });
    lines.push(vals.join('\t'));
  });
  return lines.join('\n');
}

function downloadBlob(content,filename,type){
  var blob=new Blob(['﻿'+content],{type:type||'text/csv;charset=utf-8'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
}

function downloadCSV(){
  if(parsedRows.length===0){ alert('请先解析数据'); return; }
  downloadBlob(toCSV(parsedRows),'问卷数据_'+new Date().toISOString().slice(0,10)+'.csv');
}

function downloadJSON(){
  if(parsedRows.length===0){ alert('请先解析数据'); return; }
  downloadBlob(JSON.stringify(parsedRows,null,2),'问卷数据_'+new Date().toISOString().slice(0,10)+'.json','application/json');
}
</script>
</body>
</html>
